		function getAllSiblingInputs(elem, filter) {
			var sibs = [];
			//    console.log("ele node name:",elem.nodeName);
			elem = elem.parentNode.parentNode.firstChild;
			do {
				if (elem.nodeType === 3) continue; // text node
				if (!filter || filter(elem)) sibs.push(elem.firstChild);
				//	console.log("name:",elem.firstChild.value);
			} while (elem = elem.nextSibling)
			return sibs;
		}

		function shuffle(array) {
			var currentIndex = array.length, temporaryValue, randomIndex;

			while (0 !== currentIndex) {

				randomIndex = Math.floor(Math.random() * currentIndex);
				currentIndex -= 1;
				// And swap it with the current element.
				temporaryValue = array[currentIndex];
				array[currentIndex] = array[randomIndex];
				array[randomIndex] = temporaryValue;
			}
			return array;
		}

		function nl2br(str) { return (str || '').replace(/\n/g, '<br>'); }
		function md2html(str) {
			if (!str) return '';
			// Protect math blocks from marked: stash them, parse markdown, restore
			const stash = [];
			// Replace $$...$$ (display) first, then $...$ (inline)
			let s = str
				.replace(/\$\$[\s\S]+?\$\$/g, m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; })
				.replace(/\$[^\$\n]+?\$/g,     m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; });
			// Convert single newlines to hard line breaks (two trailing spaces + newline)
			// but leave blank lines (double newlines) alone so paragraphs still work
			s = s.replace(/([^\n])\n([^\n])/g, '$1  \n$2');
			s = marked.parse(s);
			// Restore math tokens
			s = s.replace(/%%MATH(\d+)%%/g, (_, i) => stash[parseInt(i)]);
			return s;
		}

			(function () {

				var el = document.getElementById('question');
				el.addEventListener('touchstart', function (e) {
					touchStartX = e.changedTouches[0].clientX;
					touchStartY = e.changedTouches[0].clientY;
				}, { passive: true });
				el.addEventListener('touchend', function (e) {
					var dx = e.changedTouches[0].clientX - touchStartX;
					var dy = e.changedTouches[0].clientY - touchStartY;
					// Only treat as horizontal swipe if horizontal movement dominates
					if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy)) {
						var slideOut = dx < 0 ? '-60px' : '60px';
						var slideIn  = dx < 0 ?  '60px' : '-60px';
						$(el).animate({ opacity: 0, left: slideOut }, 180, function () {
							if (dx < 0) $("#nextQuestion").trigger('click');
							else        $("#preQuestion").trigger('click');
							$(el).css({ left: slideIn }).animate({ opacity: 1, left: '0px' }, 180);
						});
					}
				}, { passive: true });
			})();

					'editAddQuestion.html?number=' + numberNow + '&mode=edit&isEnglish=' + isEnglish,
					'_blank' // <- This is what makes it open in a new window.
				);
			});

			$("#expand-collapse-button").click(function () {
				if (allCollapsed) {
					allCollapsed = false;
					$(this).html("Collapse All");
					$("#allQuestionsHere .eachItem").each(function () {
						//console.log("key:",$(this).data("key"));
						//console.log("length:",$(this).children().length);
						if ($(this).children().length == 2) {
							$(this).append("<div class='eachAnswer'>" + itemList[$(this).data("key")].answer + "</div>");
						}
					});
					renderMathInElement(document.getElementById("allQuestionsHere"), katex_opts);

				} else {
					allCollapsed = true;
					$("#allQuestionsHere .eachAnswer").remove();
					$(this).html("Expand All");
				}
			});

		});  // ready

	</script>

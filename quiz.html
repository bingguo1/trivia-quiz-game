		function getAllSiblingInputs(elem, filter) {

			elem = elem.parentNode.parentNode.firstChild;
			do {
				if (elem.nodeType === 3) continue; // text node
				if (!filter || filter(elem)) sibs.push(elem.firstChild);
				//	console.log("name:",elem.firstChild.value);
			} while (elem = elem.nextSibling)
			return sibs;
		}

		function shuffle(array) {
			var currentIndex = array.length, temporaryValue, randomIndex;

			while (0 !== currentIndex) {

				randomIndex = Math.floor(Math.random() * currentIndex);
				currentIndex -= 1;
				// And swap it with the current element.
				temporaryValue = array[currentIndex];
				array[currentIndex] = array[randomIndex];
				array[randomIndex] = temporaryValue;
			}
			return array;
		}

		function nl2br(str) { return (str || '').replace(/\n/g, '<br>'); }
		function md2html(str) {
			if (!str) return '';
			// Protect math blocks from marked: stash them, parse markdown, restore
			const stash = [];
			// Replace math delimiters (display first, then inline) to protect from marked
			let s = str
				.replace(/\$\$[\s\S]+?\$\$/g,       m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; })
				.replace(/\\\[[\s\S]+?\\\]/g,        m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; })
				.replace(/\$[^\$\n]+?\$/g,           m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; })
				.replace(/\\\([\s\S]+?\\\)/g,         m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; });
			// Convert single newlines to hard line breaks (two trailing spaces + newline)
			// but leave blank lines (double newlines) alone so paragraphs still work
			s = s.replace(/([^\n])\n([^\n])/g, '$1  \n$2');
			s = marked.parse(s);
			// Restore math tokens
			s = s.replace(/%%MATH(\d+)%%/g, (_, i) => stash[parseInt(i)]);
			return s;
		}

				document.querySelectorAll('input.option').forEach(function(cb) {

						var checkedCount = Array.from(subCbs).filter(function(s) { return s.checked; }).length;
						cb.checked = checkedCount > 0;
						cb.indeterminate = checkedCount > 0 && checkedCount < subCbs.length;

						for (const key in response) {
							var top = { id: response[key].Id, name: response[key].name, subcats: [] };
							categorylist[top.id] = top.name;
							for (let i = 0; i < response[key].subcats.length; i++) {

								categorylist[response[key].subids[i]] = "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;" + response[key].subnames[i];

			function applyCategoryHighlights() {
				document.querySelectorAll('#select-categories input').forEach(function(cb) {
					var li = cb.parentNode;
					var n;
					if (cb.classList.contains('option')) {
						// Top-level: sum subcategory counts from sibling subOption inputs
						var subUl = li.querySelector('ul');
						if (subUl) {
							n = 0;
							subUl.querySelectorAll('input.subOption').forEach(function(sub) {
								n += (category2questionIds[sub.value] || []).length;
							});
						} else {
							n = (category2questionIds[cb.value] || []).length;
						}
					} else {
						n = (category2questionIds[cb.value] || []).length;
					}
					if (n > 0) {
						li.classList.add('cat-cached');
					} else {
						li.classList.remove('cat-cached');
					}
					// Update count badge in the sibling label
					var label = li.querySelector('label');
					if (label) {
						var badge = label.querySelector('.cat-count');
						if (badge) {
							badge.textContent = n;
							badge.className = n > 0 ? 'cat-count' : 'cat-count cat-count-zero';
						}
					}
				});
			}

						localStorage.setItem('questionCache', JSON.stringify(questionCache));
						localStorage.setItem('category2questionIds', JSON.stringify(category2questionIds));
						applyCategoryHighlights();
						chooseAll = false;
						total = numberlist.length;
						console.log('[DB] Fetched ' + total + ' questions for selected categories (DB)');
						$("#stats").html("Total:" + total);
						sessionStorage.setItem("chooseAll", "false");
						localStorage.setItem("chooseAll", "false");
						shuffleAndStart();
					} else {
						alert(response);
					}
				});
			}); // startThemDB click

			$("#startAll").click(function () {
				if (Object.keys(questionCache).length === 0) {
					alert('No cached questions found.\nPlease use "Select Them (DB)" to fetch from database first.');
					return;
				}
				chooseAll = true;
				numberlist = Object.keys(questionCache);
				total = numberlist.length;
				$("#stats").html("Total:" + total);
				sessionStorage.setItem("chooseAll", "true");
				localStorage.setItem("chooseAll", "true");
				shuffleAndStart();
			}); // startAll click

			function getQuestionFromAjax(response) {
				if (response[0] == "succeed") {
					response.shift(); // use shift() to remove the first element
					// Store raw values in cache so next visit skips AJAX
					questionCache[numberNow] = [response[0], response[1], response[2], response[3]];
					try { localStorage.setItem('questionCache', JSON.stringify(questionCache)); } catch(e) {}
					currentSet = [
						nl2br(response[0]),   // question: plain text
						md2html(response[1]), // answer: markdown
						md2html(response[2])  // detail: markdown
					];
					var catName = (categorylist[response[3]] || '').replace(/(&nbsp;)+/g, ' ').trim();
					$("#question").html(currentSet[0] + '<span class="question-category">' + catName + '</span>');
				} else {
					alert(response);
				}
			}
			function showQuestion(iQuestion) {
				$("#answer").html("");
				$("#detail").html("");
				localStorage.setItem("iQuestion", iQuestion);
				var num = numberlist[iQuestion];
				localStorage.setItem("number", num);
				numberNow = num;
				var j = iQuestion + 1;
				$("#stats").html(j + '/' + total);
				if (questionCache[num]) {
					// Serve from cache — no AJAX needed
					var cached = questionCache[num];
					currentSet = [
						nl2br(cached[0]),
						md2html(cached[1]),
						md2html(cached[2])
					];
					var catName = (categorylist[cached[3]] || '').replace(/(&nbsp;)+/g, ' ').trim();
					$("#question").html(currentSet[0] + '<span class="question-category">' + catName + '</span>');
				} else {
					// Fallback: fetch individually if not in cache
					var str = { mode: 'byNumber', number: num };
					var stringArr = ["question", "answer", "detail", "category"];
					console.log('[DB] Fetching single question by number:', num);
					askphp(str, stringArr, getQuestionFromAjax);
				}
			}

			function shuffleAndStart() {
				$("#select-and-click").hide();
				shuffle(numberlist);
				i = 0;
				$("#showlater").show();
				showQuestion(i);
				localStorage.setItem("total", total);
				localStorage.setItem("state", "running");
				localStorage.setItem("numberlist", JSON.stringify(numberlist));
			}

			$("#nextQuestion").click(function () {
				if (i == (total - 1)) return;
				i++;
				showQuestion(i);
			});  // click

			$("#preQuestion").click(function () {
				if (i == 0) return;
				i--;
				showQuestion(i);
			});  // click

			$(document).on('keydown', function (e) {
				if ($("#showlater").is(":visible")) {
					if (e.key === 'ArrowRight') $("#nextQuestion").trigger('click');
					else if (e.key === 'ArrowLeft')  $("#preQuestion").trigger('click');
					else if (e.key === 'ArrowDown') { e.preventDefault(); $("#showAnswer").trigger('click'); }
				}
			});

			// Swipe on #question area to navigate
			(function () {
				var touchStartX, touchStartY;
				var el = document.getElementById('question');
				el.addEventListener('touchstart', function (e) {
					touchStartX = e.changedTouches[0].clientX;
					touchStartY = e.changedTouches[0].clientY;
				}, { passive: true });
				el.addEventListener('touchend', function (e) {
					var dx = e.changedTouches[0].clientX - touchStartX;
					var dy = e.changedTouches[0].clientY - touchStartY;
					// Only treat as horizontal swipe if horizontal movement dominates
					if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy)) {
						var slideOut = dx < 0 ? '-60px' : '60px';
						var slideIn  = dx < 0 ?  '60px' : '-60px';
						$(el).animate({ opacity: 0, left: slideOut }, 180, function () {
							if (dx < 0) $("#nextQuestion").trigger('click');
							else        $("#preQuestion").trigger('click');
							$(el).css({ left: slideIn }).animate({ opacity: 1, left: '0px' }, 180);
						});
					}
				}, { passive: true });
			})();

			$("#showAnswer").click(function () {
				$("#answer").html(currentSet[1]);
				$("#detail").html("<hr>" + currentSet[2]);
				renderMathInElement(document.getElementById("answer"), katex_opts);
				renderMathInElement(document.getElementById("detail"), katex_opts);
			});


			$("#giveup").click(function () {
				sessionStorage.removeItem("state");
				localStorage.removeItem("state");
				$("#showlater").hide();
				if ($('#select-categories').html() == '') showCategoriesFromCacheOrDB(reapplyCheckboxSelections);
				else { $("#select-and-click").show(); reapplyCheckboxSelections(); }
				allQuestionShowedBefore = false;
				$("#allQuestionsHere").html("");
				$("#expand-collapse").hide();
				$("#showAll").html("showAll");
				listshowing = false;

			});

			$("#showAll").click(function () {
				if (listshowing) {
					listshowing = false;
					//$("#allQuestionsHere").html("");
					$("#expand-collapse").hide();
					$("#allQuestionsHere").hide();
					$(this).html("showAll");
					return;
				}
				else if (allQuestionShowedBefore) {
					//allQuestionContent=allQuestionContentCopy.slice();   // in javascript, arr1=arr2 will only create a reference to  arr2, how arr1 change will affect arr2
					$(this).html("hideAll");
					listshowing = true;
					//$("#allQuestionsHere").html(allQuestionContent);
					$("#expand-collapse").show();
					$("#allQuestionsHere").show();

					return;
				}
				allQuestionShowedBefore = true;
				allQuestionContent = [];
				itemList = [];
				if (!numberlist || numberlist.length === 0) {
					alert('No questions loaded. Please select categories first.');
					allQuestionShowedBefore = false;
					return;
				}
				for (var _i = 0; _i < numberlist.length; _i++) {
					var _num = numberlist[_i];
					var _cached = questionCache[_num];
					var _question = _cached ? _cached[0] : ('Q#' + _num);
					var _answer = _cached ? _cached[1] : '';
					var _catRaw = _cached ? (categorylist[_cached[3]] || '') : '';
					var _emoji = getCatEmoji(_catRaw.replace(/(&nbsp;)+/g, ' ').trim());
					var oneButtonHTML = "<div class='eachItem' data-key=" + _i + "> <button class='eachQuestion' type='button' onclick='clickitem( " + _i + ", event)'>" + (_emoji ? _emoji + ' ' : '') + _question + "</button> <button class='eachEditButton' onclick='editItem( " + _i + ")'> Edit </button> </div>";
					var oneitem = new item(_num, _question, _answer);
					itemList.push(oneitem);
					allQuestionContent.push(oneButtonHTML);
				}
				$("#allQuestionsHere").html(allQuestionContent);
				$(this).html("hideAll");
				$("#expand-collapse").show();
				listshowing = true;


			});



			$("#editit").click(function () {
				//console.log("numberlist[i]:"+numberlist[i]);
				var isEnglish = false;
				$.ajax({    //create an ajax request to load_page.php
					async: false,
					global: false,
					data: { number: numberlist[i] },
					type: "POST",
					url: "api/getCategory.php",
					dataType: "json",   //expect html to be returned
					success: function (response) {
						isEnglish = parseInt(response[0]) == 900;
						//		      console.log("isEnglish:"+isEnglish);
					},
					error: function (xhr, status, error) {
						var errorMessage = xhr.status + ': ' + xhr.statusText;
						console.log(" error comming .....");
						alert('Error - ' + errorMessage + ' status:' + status + ' error:' + error);
					}
				});   // ajax
				window.open(
					'editAddQuestion.html?number=' + numberNow + '&mode=edit&isEnglish=' + isEnglish,
					'_blank' // <- This is what makes it open in a new window.
				);
			});

			function openAddPageWithCategory(url) {
				if (!numberNow) { window.open(url, '_blank'); return; }
				$.ajax({
					async: false,
					global: false,
					data: { number: numberNow },
					type: "POST",
					url: "api/getCategory.php",
					dataType: "json",
					success: function (response) {
						Cookies.set("previousCategory", response[0]);
					}
				});
				window.open(url, '_blank');
			}
			$("#add1btn").click(function () { openAddPageWithCategory('editAddQuestion.html?mode=add'); });
			$("#add2btn").click(function () { openAddPageWithCategory('addTwoMoreQuestion.html'); });

			$("#refreshCategories").click(function () {
				getCategoriesFromDB_andShow(reapplyCheckboxSelections);
			});

			$("#expand-collapse-button").click(function () {
				if (allCollapsed) {
					allCollapsed = false;
					$(this).html("Collapse All");
					$("#allQuestionsHere .eachItem").each(function () {
						//console.log("key:",$(this).data("key"));
						//console.log("length:",$(this).children().length);
						if ($(this).children().length == 2) {
							$(this).append("<div class='eachAnswer'>" + itemList[$(this).data("key")].answer + "</div>");
						}
					});
					renderMathInElement(document.getElementById("allQuestionsHere"), katex_opts);

				} else {
					allCollapsed = true;
					$("#allQuestionsHere .eachAnswer").remove();
					$(this).html("Expand All");
				}
			});

		});  // ready

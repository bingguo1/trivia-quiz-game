	<!-- KaTeX for math rendering -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/katex.min.css" integrity="sha384-KiWOvVjnN8qwAZbuQyWDIbfCLFhLXNETzBQjA/92pIowpC0d2O3nppDGQVgwd2nB" crossorigin="anonymous">
	<script defer src="https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/katex.min.js" integrity="sha384-0fdwu/T/EQMsQlrHCCHoH10pkPLlKA1jL5dFyUOvB3lfeT2540/2g6YgSi2BL14p" crossorigin="anonymous"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/contrib/auto-render.min.js" integrity="sha384-+XBljXPPiv+OzfbB3cVmLHf4hdUFHlWNZN5spNQ7rmHTXpd7WvJum6fIACpNNfIR" crossorigin="anonymous"></script>

	<script src="https://cdn.jsdelivr.net/npm/js-cookie@3/dist/js.cookie.min.js"></script>

	<!-- EasyMDE for answer/detail editing -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
	<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>

	<!-- Markdown rendering -->
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>
	<script>

		if (getit("signinUser") == "undefined" || getit("signinUser") == "") {
			window.location.href = "signadmin.html";  /////跳转到另一页面
		}


		const katex_opts = {
			delimiters: [
				{ left: '$$', right: '$$', display: true },
				{ left: '$', right: '$', display: false },
				{ left: '\\(', right: '\\)', display: false },
				{ left: '\\[', right: '\\]', display: true }
			],
			throwOnError: false
		};

		function renderPreview(textareaId, previewId) {
			const raw = document.getElementById(textareaId).value;
			const preview = document.getElementById(previewId);
			// Replace newlines with <br> then render math
			preview.innerHTML = raw.replace(/\n/g, '<br>');
			renderMathInElement(preview, katex_opts);
		}

		function bindPreview(textareaId, previewId) {
			const ta = document.getElementById(textareaId);
			ta.addEventListener('input', () => renderPreview(textareaId, previewId));
		}

		function md2html(str) {
			if (!str) return '';
			const stash = [];
			let s = str
				.replace(/\$\$[\s\S]+?\$\$/g, m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; })
				.replace(/\$[^\$\n]+?\$/g,     m => { stash.push(m); return `%%MATH${stash.length - 1}%%`; });
			s = s.replace(/([^\n])\n([^\n])/g, '$1  \n$2');
			s = marked.parse(s);
			s = s.replace(/%%MATH(\d+)%%/g, (_, i) => stash[parseInt(i)]);
			return s;
		}

		function askphp(params, columnSets, callback) {
			$.ajax({    //create an ajax request to load_page.php
				async: true,
				global: false,
				data: Object.assign({ columnSets: columnSets }, params),
				type: "POST",
				url: "api/askphp.php",
				dataType: "json",   //expect html to be returned
				success: callback
			});   // ajax
		}

		function fillCategories(callback) {
			if (Cookies.get("categorylist")) {
				let node = "";
				let categorylist = JSON.parse(Cookies.get("categorylist"));
				for (let [key, value] of Object.entries(categorylist)) {
					node += `<option value='${key}'>${value}</option>`;
				}
				$("#category").append(node);
				if (callback) callback();
			} else {
				// Cookie missing — fetch from DB directly
				$.ajax({
					global: false,
					type: "POST",
					url: "api/getAllCategories.php",
					dataType: "json",
					success: function (response) {
						let node = "";
						let categorylist = {};
						for (const key in response) {
							categorylist[response[key].Id] = response[key].name;
							node += `<option value='${response[key].Id}'>${response[key].name}</option>`;
							for (let i = 0; i < response[key].subcats.length; i++) {
								categorylist[response[key].subids[i]] = "\u00a0\u00a0\u00a0\u00a0\u00a0" + response[key].subnames[i];
								node += `<option value='${response[key].subids[i]}'>\u00a0\u00a0\u00a0\u00a0\u00a0${response[key].subnames[i]}</option>`;
							}
						}
						$("#category").append(node);
						Cookies.set("categorylist", JSON.stringify(categorylist));
						if (callback) callback();
					}
				});
			}
		}

		$(function () {
			// https://github.com/webfashionist/RichText
			// https://stackoverflow.com/questions/19491336/how-to-get-url-parameter-using-jquery-or-plain-javascript
			$("#greet").append(getit("signinUser"));
			bindPreview('question', 'question-preview');

			// EasyMDE for answer and detail
			var mdeAnswer = new EasyMDE({
				element: document.getElementById('answer'),
				spellChecker: false,
				status: false,
				toolbar: ['bold','italic','strikethrough','|','unordered-list','ordered-list','|','code','|','preview'],
				previewRender: function(text, previewEl) {
					previewEl.innerHTML = md2html(text);
					setTimeout(() => renderMathInElement(previewEl, katex_opts), 0);
					return previewEl.innerHTML;
				},
			});
			var mdeDetail = new EasyMDE({
				element: document.getElementById('detail'),
				spellChecker: false,
				status: false,
				toolbar: ['bold','italic','strikethrough','|','unordered-list','ordered-list','|','code','|','preview'],
				previewRender: function(text, previewEl) {
					previewEl.innerHTML = md2html(text);
					setTimeout(() => renderMathInElement(previewEl, katex_opts), 0);
					return previewEl.innerHTML;
				},
			});
			let searchParams = new URLSearchParams(window.location.search);
			var englishMode = false;
			var number;
			var sqlmode;
			if (searchParams.get('mode') == "edit") {
				sqlmode = "update";
				$("#submit-button").attr("value", "Change it");
				number = searchParams.get("number");
			} else {
				sqlmode = "insert";
			}

			if (searchParams.get('mode') == "edit" && searchParams.get('isEnglish') == "true") {
				englishMode = true;
				$('#question').css({ height: "150" });
				$('#detail').css("height", "50px");
			}
			else
				$('#detail').css({ height: "180" });

			fillCategories(function() {
				if (searchParams.get('mode') == "edit") {
					var str = { mode: 'byNumber', number: number };
					var stringArr = ["category", "question", "answer", "detail"];
					askphp(str, stringArr, function (result) {
						$("#category").val(result[1]);
						$("#question").val(result[2]).trigger("change");
						mdeAnswer.value(result[3]);
						mdeDetail.value(result[4]);
						renderPreview('question', 'question-preview');
					});
				} else {
					if (Cookies.get("previousCategory")) {
						$("#category").val(Cookies.get("previousCategory"));
					}
				}
			});


			$("#form1").submit(function (e) {
				e.preventDefault(); // Prevent default form submission
				$("#question").trigger("change");
				$("#detail").trigger("change");
				var category = $("#category").val();
				var question = $("#question").val().trim();
				var answer = mdeAnswer.value();
				var detail = mdeDetail.value();
				//console.log("new detail:"+detail);
				if (category == "" || question.trim() == "" || answer.trim() == "") {
					console.log("Validation failed: missing required fields");
					return false;
				}
				var arr = [category, question, answer, detail];
				$.ajax({    //create an ajax request to load_page.php
					async: true,
					global: false,
					data: { sqlmode: sqlmode, number: number, category: category, question: question, answer: answer, detail: detail },
					type: "POST",
					url: "api/updateAddQuestion.php",
					dataType: "json",   //expect html to be returned
					success: function (response) {
						// console.log("response:"+response);
						// Update localStorage cache so quiz.html reflects the edit immediately
						if (searchParams.get('mode') == "edit") {
							try {
								var cache = JSON.parse(localStorage.getItem('questionCache') || '{}');
								if (cache[number]) {
									cache[number] = [question, answer, detail];
									localStorage.setItem('questionCache', JSON.stringify(cache));
								}
							} catch(e) {}
						}
						$("#succeed").fadeIn();
						if (searchParams.get('mode') == "edit") {
							window.location.href = "quiz.html";
						} else {
								$("#question").val("");
								mdeAnswer.value("");
								mdeDetail.value("");
								$("#succeed").fadeOut();
						}

					}
				});   // ajax
				//    e.preventDefault();
				Cookies.set("previousCategory", category);

			});


		});  //ready
	</script>


	<div class="container">

		<div id="row">
			<a href="signadmin.html"> <button type="button" class="btn btn-primary">Back to Admin</button> </a>
			<a href="quiz.html"> <button type="button" class="btn btn-primary">Back to Quiz</button></a>
			<span id="greet" style="float:right;">Hi! </span>
		</div>

		<div>
			<form id="form1" method="post">
				<label for="category">Select Category</label>
				<select name="categories" id="category">
				</select>
				<br>
				Question: <br>
				<textarea name="question" id="question" rows="2"></textarea>
				<div class="field-preview" id="question-preview"></div><br>
				Answer: <br>
				<!--- no space between textarea, or when you edit, you wont start from the beginning  --->
				<textarea name="answer" id="answer"></textarea>
				Detail: <br>
				<textarea name="detail" id="detail"></textarea><br>
				<input type="submit" value="Add It!" id="submit-button">
				<span id="succeed"> succeeded </span>
				<span id="fail"> failed </span>

				<!-- <script> -->
				<!--   CKEDITOR.replace( 'detail' ); -->
				<!-- </script> -->
			</form>
		</div>


	</div>
</body>
